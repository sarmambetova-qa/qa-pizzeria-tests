[loggers]
keys=root,console,file,selenium

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=commonFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler,fileHandler

[logger_console]
level=INFO
handlers=consoleHandler
qualname=console

[logger_file]
level=DEBUG
handlers=fileHandler
qualname=file

[logger_selenium]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=selenium.webdriver.remote
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=commonFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=commonFormatter
args=('module_6/tests/accounts/log.txt', 'w')

[formatter_commonFormatter]
format=[%(levelname)s][%(asctime)s][%(name)s] %(message)s
datefmt=
